<!doctype html>
<html>
  <head><meta charset="utf-8" /></head>
  <body>
    <script>
      const send = (type, payload = {}) =>
        window.parent.postMessage({ isStreamlitMessage: true, type, ...payload }, "*");

      window.addEventListener("message", (event) => {
        const message = event.data || {};
        if (message.type !== "streamlit:render") return;
        const args = message.args || {};
        let value = null;
        try {
          if (args.action === "set") {
            localStorage.setItem(args.storageKey, String(args.value || ""));
            value = localStorage.getItem(args.storageKey);
          } else if (args.action === "delete") {
            localStorage.removeItem(args.storageKey);
          } else {
            value = localStorage.getItem(args.storageKey);
          }
        } catch (error) {
          value = null;
        }
        send("streamlit:setComponentValue", { value });
        send("streamlit:setFrameHeight", { height: 0 });
      });

      send("streamlit:componentReady", { apiVersion: 1 });
      send("streamlit:setFrameHeight", { height: 0 });
    </script>
  </body>
</html>
